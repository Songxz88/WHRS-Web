<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工业余热回收经济效益计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input-group { @apply mb-4; }
        label { @apply block text-sm font-medium text-gray-700 mb-1; }
        input { @apply w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500; }
    </style>
</head>

<head>
    <meta charset="UTF-8">
    <title>余热回收能效分析云端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50">
    <div class="max-w-6xl mx-auto py-10 px-4">
        <div class="bg-white rounded-2xl shadow-xl flex flex-wrap overflow-hidden">
            <div class="w-full md:w-1/3 p-8 border-r border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-slate-800">参数配置</h2>
                </div>
            
            <div class="w-full md:w-2/3 p-8 bg-slate-50/50">
                <h2 class="text-xl font-bold mb-6 text-slate-800">效益分析可视化</h2>
                <div class="h-64 mb-8">
                    <canvas id="myChart"></canvas> 
                </div>
                </div>
        </div>
    </div>
</body>
</html>
<body class="bg-gray-50 p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-xl overflow-hidden">
        <header class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">余热回收项目初步测算工具</h1>
            <p class="opacity-80 mt-2">快速评估能源节约潜力与经济回收期</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 p-8">
            <section>
                <h2 class="text-lg font-semibold mb-4 border-b pb-2 text-blue-800">1. 工况参数</h2>
                <div class="input-group">
                    <label>流体流量 (kg/h)</label>
                    <input type="number" id="flowRate" value="10000">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group">
                        <label>进口温度 (℃)</label>
                        <input type="number" id="tempIn" value="150">
                    </div>
                    <div class="input-group">
                        <label>出口温度 (℃)</label>
                        <input type="number" id="tempOut" value="80">
                    </div>
                </div>
                <div class="input-group">
                    <label>流体比热容 (kJ/kg·℃)</label>
                    <input type="number" id="specificHeat" value="4.18" step="0.01">
                    <span class="text-xs text-gray-400">* 水约4.18，烟气约1.05</span>
                </div>

                <h2 class="text-lg font-semibold mb-4 border-b pb-2 mt-6 text-blue-800">2. 运营及成本</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group">
                        <label>年运行时间 (h)</label>
                        <input type="number" id="hours" value="7200">
                    </div>
                    <div class="input-group">
                        <label>换热效率 (%)</label>
                        <input type="number" id="efficiency" value="85">
                    </div>
                </div>
                <div class="input-group">
                    <label>项目投资总额 (万元)</label>
                    <input type="number" id="investment" value="50">
                </div>
                <div class="input-group">
                    <label>热力价值单价 (元/GJ)</label>
                    <input type="number" id="energyPrice" value="60">
                </div>
                
                <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">立即计算</button>
            </section>

            <section class="bg-blue-50 p-6 rounded-lg border border-blue-100">
                <h2 class="text-lg font-semibold mb-6 text-blue-800">3. 测算结果</h2>
                
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">小时回收热量:</span>
                        <span class="text-xl font-bold text-blue-700"><span id="resHeatHour">0</span> GJ/h</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">年回收总热量:</span>
                        <span class="text-xl font-bold text-blue-700"><span id="resHeatYear">0</span> GJ/y</span>
                    </div>
                    <hr>
                    <div class="flex justify-between items-center text-green-700">
                        <span class="font-medium">年节约标准煤:</span>
                        <span class="text-xl font-bold"><span id="resCoal">0</span> 吨/年</span>
                    </div>
                    <div class="flex justify-between items-center text-green-700">
                        <span class="font-medium">年经济收益:</span>
                        <span class="text-xl font-bold">¥ <span id="resMoney">0</span> 万元</span>
                    </div>
                    <hr>
                    <div class="p-4 bg-white rounded-lg border-2 border-orange-400 text-center">
                        <span class="block text-gray-500 text-sm">预计静态投资回收期</span>
                        <span class="text-3xl font-black text-orange-500"><span id="resPeriod">0</span> 年</span>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        function calculate() {
            // 获取输入值
            const m = parseFloat(document.getElementById('flowRate').value);
            const tin = parseFloat(document.getElementById('tempIn').value);
            const tout = parseFloat(document.getElementById('tempOut').value);
            const cp = parseFloat(document.getElementById('specificHeat').value);
            const h = parseFloat(document.getElementById('hours').value);
            const eff = parseFloat(document.getElementById('efficiency').value) / 100;
            const invest = parseFloat(document.getElementById('investment').value);
            const price = parseFloat(document.getElementById('energyPrice').value);

            // 1. 计算小时理论放热量 (Q = m * cp * deltaT) 单位：kJ/h
            const qKjHour = m * cp * (tin - tout);
            // 2. 实际小时回收热量 (考虑效率，换算为GJ)
            const qGjHour = (qKjHour * eff) / 1000000;
            // 3. 年回收热量
            const qGjYear = qGjHour * h;
            // 4. 年节煤 (1吨标煤 = 29.3 GJ)
            const coalYear = qGjYear / 29.3;
            // 5. 年收益 (万元)
            const moneyYear = (qGjYear * price) / 10000;
            // 6. 回收期
            const period = invest / moneyYear;

            // 更新UI
            document.getElementById('resHeatHour').innerText = qGjHour.toFixed(2);
            document.getElementById('resHeatYear').innerText = qGjYear.toFixed(0);
            document.getElementById('resCoal').innerText = coalYear.toFixed(1);
            document.getElementById('resMoney').innerText = moneyYear.toFixed(2);
            document.getElementById('resPeriod').innerText = isFinite(period) ? period.toFixed(1) : "---";
        }

        // 初始化运行一次
        calculate();
    </script>
</body>
</html>
