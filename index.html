<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatMaster Pro | 工业余热回收全流程诊断</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', "PingFang SC", sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { @apply bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 transition-all; }
        .energy-opt { @apply cursor-pointer border-2 border-slate-100 p-3 rounded-xl text-center transition-all hover:bg-slate-50 flex flex-col items-center gap-2; }
        .energy-opt.active { @apply border-blue-600 bg-blue-50 text-blue-600 font-bold shadow-md; }
        label { @apply block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider px-1; }
        input, select { @apply w-full bg-slate-50 border-none p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium; }
        .expert-panel { @apply bg-slate-50 p-4 rounded-2xl border-l-4 border-l-orange-400 mt-4 hidden; }
        
        /* 流程动画 */
        .flow-line { position: relative; overflow: hidden; }
        .flow-line::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; h: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: flow 2s linear infinite;
        }
        @keyframes flow { to { left: 100%; } }
        .spin-slow { animation: spin 6s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-12">

    <div class="max-w-7xl mx-auto px-4 pt-8">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i data-lucide="activity"></i></div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight">HeatMaster <span class="text-blue-600">Flow</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">全场景余热回收流程仿真系统</p>
                </div>
            </div>
            <button onclick="toggleExpert()" id="expertBtn" class="flex items-center gap-2 bg-white px-4 py-2 rounded-2xl border text-[10px] font-bold text-slate-500">
                <i data-lucide="settings-2" size="14"></i> 专家模式
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="card">
                    <label>现有能源</label>
                    <div class="grid grid-cols-3 gap-2 mt-2">
                        <div onclick="setEnergy('gas')" id="opt-gas" class="energy-opt active text-[10px]">天然气</div>
                        <div onclick="setEnergy('elec')" id="opt-elec" class="energy-opt text-[10px]">电加热</div>
                        <div onclick="setEnergy('coal')" id="opt-coal" class="energy-opt text-[10px]">标煤</div>
                    </div>
                </div>

                <div class="card space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label>投资(万)</label><input type="number" id="invest" value="100"></div>
                        <div><label id="priceLabel">气价</label><input type="number" id="unitPrice" value="3.5"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label>废气量(m³/h)</label><input type="number" id="exFlow" value="20000"></div>
                        <div><label>废气初温(℃)</label><input type="number" id="exTemp" value="150"></div>
                    </div>
                    <div id="expertSection" class="expert-panel space-y-3">
                        <div><label>海拔(m)</label><input type="number" id="altitude" value="0"></div>
                        <div><label>换热阻力(Pa)</label><input type="number" id="pDrop" value="300"></div>
                    </div>
                    <button onclick="calculate()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-blue-600 transition-all shadow-lg">更新系统状态</button>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="card border-dashed bg-slate-50/50">
                        <p class="text-[10px] font-bold text-slate-400 mb-6 text-center uppercase tracking-widest">原有工况 (无回收)</p>
                        <div class="space-y-8 relative">
                            <div class="flex items-center justify-between px-4">
                                <div class="text-center"><div class="w-8 h-8 bg-orange-100 rounded text-orange-600 flex items-center justify-center mx-auto mb-1"><i data-lucide="thermometer-sun" size="16"></i></div><span class="text-[10px]">150℃ 废气</span></div>
                                <div class="flex-1 h-0.5 bg-slate-200 mx-4"></div>
                                <div class="text-center"><div class="w-8 h-8 bg-slate-200 rounded text-slate-400 flex items-center justify-center mx-auto mb-1"><i data-lucide="wind" size="16"></i></div><span class="text-[10px]">直接排放</span></div>
                            </div>
                            <div class="flex items-center justify-between px-4">
                                <div class="text-center"><div class="w-8 h-8 bg-blue-100 rounded text-blue-600 flex items-center justify-center mx-auto mb-1"><i data-lucide="cloud" size="16"></i></div><span class="text-[10px]">15℃ 新风</span></div>
                                <div class="flex-1 h-0.5 bg-slate-200 mx-4"></div>
                                <div class="text-center font-bold text-red-500"><div class="w-8 h-8 bg-red-100 rounded text-red-600 flex items-center justify-center mx-auto mb-1"><i data-lucide="flame" size="16"></i></div><span class="text-[10px]">能源全耗</span></div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-blue-200 bg-blue-50/30 overflow-hidden">
                        <p class="text-[10px] font-bold text-blue-600 mb-6 text-center uppercase tracking-widest">HeatMaster 优化方案</p>
                        <div class="space-y-8 relative">
                            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg z-10 spin-slow">
                                <i data-lucide="refresh-cw" size="20"></i>
                            </div>
                            <div class="flex items-center justify-between px-4">
                                <div class="text-center"><span class="text-[10px] text-orange-600 font-bold" id="flowInEx">150℃</span></div>
                                <div class="flex-1 h-1 bg-orange-200 mx-4 flow-line rounded-full"></div>
                                <div class="text-center"><span class="text-[10px] text-blue-600 font-bold underline" id="flowOutEx">--℃</span></div>
                            </div>
                            <div class="flex items-center justify-between px-4">
                                <div class="text-center"><span class="text-[10px] text-blue-500 font-bold">15℃</span></div>
                                <div class="flex-1 h-1 bg-blue-200 mx-4 flow-line rounded-full"></div>
                                <div class="text-center"><span class="text-[10px] text-red-600 font-bold underline" id="flowOutAir">--℃</span></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="card bg-slate-900 text-white"><label class="opacity-50">年净节省</label><div class="text-2xl font-black">¥ <span id="resMoney">0</span> <small class="text-xs">万</small></div></div>
                    <div class="card"><label>回收期</label><div class="text-2xl font-black text-blue-600"><span id="resPeriod">0</span> <small class="text-xs">年</small></div></div>
                    <div class="card bg-emerald-500 text-white"><label class="opacity-80">年减排</label><div class="text-2xl font-black"><span id="resCo2">0</span> <small class="text-xs">吨</small></div></div>
                </div>

                <div class="card h-[350px]">
                    <canvas id="roiChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentEnergy = 'gas', isExpert = false, roiChart = null;

        function toggleExpert() {
            isExpert = !isExpert;
            document.getElementById('expertSection').style.display = isExpert ? 'block' : 'none';
        }

        function setEnergy(type) {
            currentEnergy = type;
            document.querySelectorAll('.energy-opt').forEach(el => el.classList.remove('active'));
            document.getElementById('opt-' + type).classList.add('active');
            const label = document.getElementById('priceLabel');
            const input = document.getElementById('unitPrice');
            if(type === 'gas') { label.innerText = "气价(元/m³)"; input.value = 3.6; }
            if(type === 'elec') { label.innerText = "电价(元/kWh)"; input.value = 0.85; }
            if(type === 'coal') { label.innerText = "煤价(元/t)"; input.value = 1200; }
            calculate();
        }

        function calculate() {
            const invest = parseFloat(document.getElementById('invest').value);
            const unitPrice = parseFloat(document.getElementById('unitPrice').value);
            const exFlow = parseFloat(document.getElementById('exFlow').value);
            const exTemp = parseFloat(document.getElementById('exTemp').value);
            const altitude = isExpert ? parseFloat(document.getElementById('altitude').value) : 0;
            const pDrop = isExpert ? parseFloat(document.getElementById('pDrop').value) : 300;

            // 1. 物理逻辑：考虑海拔的空气密度与换热
            const rho = 1.29 * Math.exp(-altitude / 8000); 
            const cp = 1.005, eff = 0.72; // 效率设为 72%
            
            // 计算小时回收热量 (kW)
            const deltaT_Ex = exTemp - 65; // 假设排烟降至65度
            const qKW = (exFlow * rho * cp * deltaT_Ex * eff) / 3600;
            const qGjYear = (qKW * 3600 / 1000000) * 7000;

            // 2. 流程图数值更新
            document.getElementById('flowInEx').innerText = exTemp + '℃';
            const realExOut = exTemp - (deltaT_Ex * eff);
            document.getElementById('flowOutEx').innerText = realExOut.toFixed(1) + '℃';
            // 假设新风量与废气量一致，计算新风升温
            const airRise = (qKW * 3600) / (exFlow * rho * cp);
            document.getElementById('flowOutAir').innerText = (15 + airRise).toFixed(1) + '℃';

            // 3. 经济计算 (对冲维护费与额外阻力功耗)
            let saving = 0;
            if(currentEnergy === 'gas') saving = (qGjYear / 0.035 * unitPrice) / 10000;
            if(currentEnergy === 'elec') saving = (qKW * 7000 * unitPrice) / 10000;
            if(currentEnergy === 'coal') saving = (qGjYear / 20 * unitPrice) / 10000;

            const fanCost = (exFlow / 3600 * pDrop) / 600 * 7000 * 0.85 / 10000;
            const netIncome = saving - fanCost - (invest * 0.02);

            document.getElementById('resMoney').innerText = netIncome.toFixed(1);
            document.getElementById('resPeriod').innerText = (invest / netIncome).toFixed(1);
            document.getElementById('resCo2').innerText = Math.round(qGjYear * 0.08);

            updateChart(invest, netIncome);
        }

        function updateChart(invest, income) {
            const ctx = document.getElementById('roiChart').getContext('2d');
            const years = Array.from({length: 11}, (_, i) => i + '年');
            const data = years.map((_, i) => (income * i - invest).toFixed(1));

            if(roiChart) roiChart.destroy();
            roiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [{
                        label: '累计净损益 (万元)',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = () => { calculate(); };
    </script>
</body>
</html>
