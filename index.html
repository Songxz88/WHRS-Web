<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatMaster Pro | Xizhi Song 能源仿真系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', "PingFang SC", "Microsoft YaHei", sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { @apply bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 transition-all; }
        .energy-opt { @apply cursor-pointer border-2 border-slate-100 p-3 rounded-2xl text-center transition-all hover:bg-slate-50 flex flex-col items-center gap-2; }
        .energy-opt.active { @apply border-blue-600 bg-blue-50 text-blue-600 font-bold shadow-md; }
        label { @apply block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider px-1; }
        input, select { @apply w-full bg-slate-50 border-none p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium transition-all; }
        .expert-panel { @apply bg-slate-50 p-5 rounded-2xl border-l-4 border-l-orange-400 mt-4 hidden animate-in fade-in slide-in-from-top-2; }
        .flow-line { position: relative; overflow: hidden; }
        .flow-line::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: flow 2s linear infinite;
        }
        @keyframes flow { to { left: 100%; } }
        .spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="pb-12">

    <div class="max-w-7xl mx-auto px-4 pt-8">
        <header class="flex justify-between items-center mb-8 no-print">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                    <i data-lucide="gauge"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight italic">HeatMaster <span class="text-blue-600 font-black">X</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Lead Designer: <span class="text-slate-900 font-black">Xizhi Song</span></p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="exportPDF()" class="bg-white px-4 py-2 rounded-2xl border border-slate-200 text-[10px] font-bold text-slate-600 flex items-center gap-2 hover:bg-slate-50 transition-all">
                    <i data-lucide="download" size="14"></i> 导出 PDF 报告
                </button>
                <button onclick="toggleExpert()" id="expertBtn" class="bg-white px-4 py-2 rounded-2xl border border-slate-100 text-[10px] font-bold text-slate-500 flex items-center gap-2">
                    <i data-lucide="settings-2" size="14"></i> 工程模式
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6 no-print">
                <div class="card border-blue-100 bg-blue-50/20">
                    <label class="text-blue-600">Step 0: 快速选择项目行业</label>
                    <select id="industrySelect" onchange="applyIndustryPreset()" class="mt-2 !bg-white border border-blue-100">
                        <option value="custom">-- 自定义工况 --</option>
                        <option value="printing">包装印刷 (凹印/复合)</option>
                        <option value="coating" selected>涂装烤漆 (烘干室)</option>
                        <option value="food">食品烘干 (脱水蔬菜)</option>
                        <option value="textile">纺织印染 (定型机)</option>
                        <option value="chemical">精细化工 (反应釜)</option>
                    </select>
                </div>

                <div class="card">
                    <label>Step 1: 原加热能源</label>
                    <div class="grid grid-cols-3 gap-2 mt-3">
                        <div onclick="setEnergy('gas')" id="opt-gas" class="energy-opt active text-[10px]"><i data-lucide="flame" size="16"></i>天然气</div>
                        <div onclick="setEnergy('elec')" id="opt-elec" class="energy-opt text-[10px]"><i data-lucide="zap" size="16"></i>电加热</div>
                        <div onclick="setEnergy('coal')" id="opt-coal" class="energy-opt text-[10px]"><i data-lucide="box" size="16"></i>燃煤/油</div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="font-bold text-sm mb-4 flex items-center gap-2"><i data-lucide="thermometer" size="16"></i> 实时工况参数</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>烟气入口 (℃)</label><input type="number" id="exTempIn" value="160"></div>
                            <div><label>进风入口 (℃)</label><input type="number" id="airTempIn" value="15"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>废气量 (m³/h)</label><input type="number" id="exFlow" value="25000"></div>
                            <div><label>项目投资 (万)</label><input type="number" id="invest" value="100"></div>
                        </div>
                        <div><label id="priceLabel">气价 (元/m³)</label><input type="number" id="unitPrice" value="3.5"></div>
                    </div>

                    <div id="expertSection" class="expert-panel">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>海拔 (m)</label><input type="number" id="altitude" value="0"></div>
                            <div><label>换热压降 (Pa)</label><input type="number" id="pDrop" value="350"></div>
                            <div class="col-span-2"><label>能源价格年涨幅 (%)</label><input type="number" id="eRise" value="3"></div>
                        </div>
                    </div>
                </div>

                <button onclick="calculate()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-600 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" size="18"></i> 更新诊断数据
                </button>
            </div>

            <div id="reportContent" class="lg:col-span-8 space-y-6">
                <div class="card bg-white border-l-8 border-l-blue-600 rounded-r-[2rem] rounded-l-none">
                    <h2 class="text-2xl font-black text-slate-800" id="reportTitle">工业余热回收诊断报告</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-widest">Powered by Xizhi Song Engineering Model</p>
                </div>

                <div class="card bg-slate-900 text-white relative overflow-hidden">
                    <div class="absolute right-4 top-4 spin-slow opacity-20 text-blue-400"><i data-lucide="refresh-cw" size="48"></i></div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6">能量平衡仿真 (Xizhi Song Flow)</p>
                    <div class="space-y-10 relative z-10">
                        <div class="flex items-center justify-between">
                            <div class="text-center w-20"><span class="text-[10px] text-orange-400 font-bold">烟气进口</span><br><span id="flowExInDisp" class="text-sm font-bold">160℃</span></div>
                            <div class="flex-1 h-1 bg-orange-500/30 mx-4 flow-line rounded-full"></div>
                            <div class="text-center w-20"><span class="text-[10px] text-slate-400 font-bold">回收排放</span><br><span id="flowExOut" class="text-sm font-bold text-blue-400">--℃</span></div>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="text-center w-20"><span class="text-[10px] text-blue-400 font-bold">新风入口</span><br><span id="flowAirInDisp" class="text-sm font-bold">15℃</span></div>
                            <div class="flex-1 h-1 bg-blue-500/30 mx-4 flow-line rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                            <div class="text-center w-20"><span class="text-[10px] text-red-500 font-bold">预热送风</span><br><span id="flowAirOut" class="text-sm font-bold text-red-500">--℃</span></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="card bg-blue-600 text-white shadow-xl shadow-blue-100">
                        <label class="opacity-70 text-white">年度净收益</label>
                        <div class="text-3xl font-black mt-1">¥ <span id="resMoney">0</span> <small class="text-xs">万</small></div>
                    </div>
                    <div class="card border-blue-100">
                        <label class="text-blue-600">静态回收期</label>
                        <div class="text-3xl font-black text-blue-600 mt-1"><span id="resPeriod">0</span> <small class="text-xs">年</small></div>
                    </div>
                    <div class="card bg-emerald-500 text-white">
                        <label class="opacity-80 text-white">年碳减排量</label>
                        <div class="text-3xl font-black mt-1"><span id="resCo2">0</span> <small class="text-xs">t</small></div>
                    </div>
                </div>

                <div class="card h-[380px]">
                    <canvas id="roiChart"></canvas>
                </div>

                <div id="diagBox" class="bg-blue-50 border border-blue-100 p-6 rounded-[2rem] text-xs flex items-start gap-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white shrink-0"><i data-lucide="check-circle" size="20"></i></div>
                    <div>
                        <h4 class="font-bold text-slate-800 mb-1">Xizhi Song 专家诊断意见</h4>
                        <div id="diagMsg" class="text-slate-500 italic leading-relaxed">正在分析数据...</div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center no-print">
            <p class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em]">© 2026 Developed by Xizhi Song · Industrial Energy Expert</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        let currentEnergy = 'gas', isExpert = false, roiChart = null;

        const presets = {
            printing: { exTemp: 80, exFlow: 35000, invest: 120, pDrop: 350 },
            coating: { exTemp: 160, exFlow: 25000, invest: 100, pDrop: 320 },
            food: { exTemp: 120, exFlow: 18000, invest: 75, pDrop: 280 },
            textile: { exTemp: 185, exFlow: 45000, invest: 220, pDrop: 450 },
            chemical: { exTemp: 220, exFlow: 12000, invest: 90, pDrop: 400 }
        };

        function applyIndustryPreset() {
            const ind = document.getElementById('industrySelect').value;
            if(ind === 'custom') return;
            const data = presets[ind];
            document.getElementById('exTempIn').value = data.exTemp;
            document.getElementById('exFlow').value = data.exFlow;
            document.getElementById('invest').value = data.invest;
            document.getElementById('pDrop').value = data.pDrop;
            calculate();
        }

        function toggleExpert() {
            isExpert = !isExpert;
            document.getElementById('expertSection').style.display = isExpert ? 'block' : 'none';
        }

        function setEnergy(type) {
            currentEnergy = type;
            document.querySelectorAll('.energy-opt').forEach(el => el.classList.remove('active'));
            document.getElementById('opt-' + type).classList.add('active');
            const label = document.getElementById('priceLabel');
            const input = document.getElementById('unitPrice');
            if(type === 'gas') { label.innerText = "气价(元/m³)"; input.value = 3.6; }
            if(type === 'elec') { label.innerText = "电价(元/kWh)"; input.value = 0.85; }
            if(type === 'coal') { label.innerText = "综合热价(元/GJ)"; input.value = 95; }
            calculate();
        }

        function calculate() {
            const invest = parseFloat(document.getElementById('invest').value);
            const unitPrice = parseFloat(document.getElementById('unitPrice').value);
            const exFlow = parseFloat(document.getElementById('exFlow').value);
            const exTempIn = parseFloat(document.getElementById('exTempIn').value);
            const airTempIn = parseFloat(document.getElementById('airTempIn').value);
            const alt = isExpert ? parseFloat(document.getElementById('altitude').value) : 0;
            const pDrop = isExpert ? parseFloat(document.getElementById('pDrop').value) : 300;
            const rise = isExpert ? parseFloat(document.getElementById('eRise').value) : 3;

            // Xizhi Song 物理模型逻辑
            const rho = 1.29 * Math.exp(-alt / 8000); 
            const cp = 1.005, eff = 0.72;
            const qKjH = exFlow * rho * cp * (exTempIn - airTempIn) * eff;
            const hours = 7200;
            const qGjYear = (qKjH / 1000000) * hours;

            // 流程图更新
            document.getElementById('flowExInDisp').innerText = exTempIn + "℃";
            document.getElementById('flowAirInDisp').innerText = airTempIn + "℃";
            const airRise = (qKjH / (exFlow * rho * cp));
            document.getElementById('flowAirOut').innerText = (airTempIn + airRise).toFixed(1) + "℃";
            document.getElementById('flowExOut').innerText = (exTempIn - airRise).toFixed(1) + "℃";

            // 经济计算
            let saving = 0;
            if(currentEnergy === 'gas') saving = (qGjYear / 0.0355 * unitPrice) / 10000;
            if(currentEnergy === 'elec') saving = (qKjH / 3600 * hours * unitPrice) / 10000;
            if(currentEnergy === 'coal') saving = (qGjYear * unitPrice) / 10000;

            const fanCost = (exFlow / 3600 * pDrop) / 650 * hours * 0.85 / 10000;
            const netIncome = saving - fanCost - (invest * 0.02);

            document.getElementById('resMoney').innerText = netIncome.toFixed(1);
            document.getElementById('resPeriod').innerText = (invest / netIncome).toFixed(1);
            document.getElementById('resCo2').innerText = Math.round(qGjYear * 0.08);

            const industryTxt = document.getElementById('industrySelect').options[document.getElementById('industrySelect').selectedIndex].text;
            document.getElementById('reportTitle').innerText = industryTxt + " · 余热回收诊断报告";
            document.getElementById('diagMsg').innerText = `基于 Xizhi Song 仿真模型，该项目运行状态良好。新风温升可达 ${airRise.toFixed(1)}℃，有效降低了前端加热器的能耗负荷。`;

            updateChart(invest, netIncome, rise);
        }

        function updateChart(invest, income, rise) {
            const ctx = document.getElementById('roiChart').getContext('2d');
            const data = Array.from({length: 11}, (_, i) => {
                let cumulative = -invest;
                for(let j=1; j<=i; j++) cumulative += income * Math.pow(1 + rise/100, j-1);
                return cumulative.toFixed(1);
            });

            if(roiChart) roiChart.destroy();
            roiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 11}, (_, i) => i + 'Y'),
                    datasets: [{
                        label: '累计损益(万)',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        fill: true, tension: 0.4, borderWidth: 4, pointRadius: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('reportContent');
            const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgProps = pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save(`Xizhi_Song_Report_${Date.now()}.pdf`);
        }

        window.onload = calculate;
    </script>
</body>
</html>
