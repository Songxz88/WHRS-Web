<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHeat | 工业余热回收数字化专家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #2563eb, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-focus { transition: all 0.3s; }
        .input-focus:focus { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="flex items-center justify-between px-8 py-4 bg-white/50 sticky top-0 z-50 backdrop-blur-md border-b">
        <div class="flex items-center gap-2">
            <i data-lucide="zap" class="text-blue-600 fill-blue-600"></i>
            <span class="text-xl font-bold tracking-tight">SmartHeat <span class="text-blue-600">Pro</span></span>
        </div>
        <div class="hidden md:flex gap-6 text-sm font-medium text-slate-500">
            <a href="#" class="hover:text-blue-600">能效算法</a>
            <a href="#" class="hover:text-blue-600">碳交易核算</a>
            <a href="#" class="hover:text-blue-600">关于我们</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-black mb-4 gradient-text">余热回收项目效益测算</h1>
            <p class="text-slate-500 max-w-2xl mx-auto">输入基础工况参数，实时获取热力平衡数据、经济回收周期及碳减排环境贡献分析。</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-3xl shadow-sm">
                    <div class="flex items-center gap-2 mb-6 text-blue-700 font-semibold">
                        <i data-lucide="settings-2" size="20"></i> 核心工况参数
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold uppercase text-slate-400 mb-1 block">介质流量 (kg/h)</label>
                            <input type="number" id="flowRate" value="12000" class="w-full bg-slate-50 border-none p-3 rounded-xl input-focus">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold uppercase text-slate-400 mb-1 block">入口温度 (℃)</label>
                                <input type="number" id="tempIn" value="180" class="w-full bg-slate-50 border-none p-3 rounded-xl input-focus">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase text-slate-400 mb-1 block">预期出口 (℃)</label>
                                <input type="number" id="tempOut" value="60" class="w-full bg-slate-50 border-none p-3 rounded-xl input-focus">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-bold uppercase text-slate-400 mb-1 block">设备投资 (万元)</label>
                            <input type="number" id="investment" value="80" class="w-full bg-slate-50 border-none p-3 rounded-xl input-focus">
                        </div>
                        <div class="pt-4 border-t border-slate-100 mt-4">
                            <button onclick="updateAll()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                                <i data-lucide="refresh-cw" size="18"></i> 更新测算报告
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-emerald-900 rounded-3xl p-6 text-white shadow-xl shadow-emerald-100 relative overflow-hidden">
                    <i data-lucide="leaf" class="absolute -right-4 -bottom-4 opacity-10 w-32 h-32"></i>
                    <h3 class="font-bold flex items-center gap-2 mb-4"><i data-lucide="globe" size="18"></i> 碳减排贡献</h3>
                    <div class="text-3xl font-bold mb-1"><span id="resCO2">0</span> <span class="text-sm font-normal opacity-70">tCO2e/年</span></div>
                    <p class="text-xs text-emerald-300">相当于每年种植约 <span id="resTrees">0</span> 棵成年树木</p>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="glass-card p-6 rounded-3xl">
                        <p class="text-sm text-slate-500 mb-1">年回收热量</p>
                        <div class="text-2xl font-bold text-slate-800"><span id="resGjYear">0</span> <small class="text-xs text-slate-400">GJ</small></div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-blue-500">
                        <p class="text-sm text-slate-500 mb-1">年节省费用</p>
                        <div class="text-2xl font-bold text-blue-600">¥ <span id="resMoney">0</span> <small class="text-xs text-slate-400">万</small></div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-orange-500">
                        <p class="text-sm text-slate-500 mb-1">投资回收期</p>
                        <div class="text-2xl font-bold text-orange-600"><span id="resPeriod">0</span> <small class="text-xs text-slate-400">年</small></div>
                    </div>
                </div>

                <div class="glass-card p-8 rounded-3xl">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <h3 class="font-bold text-lg text-slate-800">现金流回正趋势预测</h3>
                            <p class="text-xs text-slate-400 italic">基于 10 年生命周期动态模拟</p>
                        </div>
                    </div>
                    <div class="w-full h-[350px]">
                        <canvas id="roiChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 初始化图标
        lucide.createIcons();

        let myChart = null;

        function updateAll() {
            // 获取输入
            const flow = parseFloat(document.getElementById('flowRate').value);
            const tIn = parseFloat(document.getElementById('tempIn').value);
            const tOut = parseFloat(document.getElementById('tempOut').value);
            const invest = parseFloat(document.getElementById('investment').value);
            
            // 默认参数
            const cp = 4.18; // 水比热容
            const hours = 8000; // 年运行时间
            const eff = 0.85; // 换热效率
            const gjPrice = 75; // 蒸汽/热力价格 (元/GJ)
            
            // 核心计算
            const qHour = (flow * cp * (tIn - tOut) * eff) / 1000000; // GJ/h
            const qYear = qHour * hours;
            const moneyYear = (qYear * gjPrice) / 10000; // 万元/年
            const period = invest / moneyYear;
            
            // 碳计算 (1GJ 热量约减排 0.08 吨CO2 - 经验系数)
            const co2Year = qYear * 0.082;
            const trees = co2Year * 5; // 粗略估算

            // 更新文本
            document.getElementById('resGjYear').innerText = Math.round(qYear).toLocaleString();
            document.getElementById('resMoney').innerText = moneyYear.toFixed(1);
            document.getElementById('resPeriod').innerText = period.toFixed(2);
            document.getElementById('resCO2').innerText = Math.round(co2Year);
            document.getElementById('resTrees').innerText = Math.round(trees);

            // 更新图表
            updateChart(invest, moneyYear);
        }

        function updateChart(invest, income) {
            const labels = Array.from({length: 11}, (_, i) => `第${i}年`);
            const data = labels.map((_, i) => (income * i - invest).toFixed(2));

            if(myChart) myChart.destroy();

            const ctx = document.getElementById('roiChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '净累计收益 (万元)',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#2563eb',
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: '#f1f5f9' },
                            ticks: { callback: value => value + '万' }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        updateAll();
    </script>
</body>
</html>
