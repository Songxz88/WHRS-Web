<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatMaster | 专项余热回收测算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background: #f8fafc; }
        .option-card { @apply cursor-pointer border-2 border-transparent bg-white p-4 rounded-2xl shadow-sm transition-all hover:border-blue-300; }
        .option-card.active { @apply border-blue-600 bg-blue-50 shadow-md; }
        .input-group label { @apply block text-xs font-bold text-slate-400 uppercase mb-1 px-1; }
        input { @apply w-full bg-white border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all; }
    </style>
</head>
<body class="text-slate-800 pb-10">

    <div class="max-w-6xl mx-auto px-4 pt-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-900">余热回收项目经济性分析</h1>
            <p class="text-slate-500 mt-2 text-sm">请选择您现有的加热能源方式，系统将为您生成专项回收曲线</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                
                <div class="space-y-3">
                    <label class="px-1 text-slate-500 font-bold">Step 1: 选择原有能源方式</label>
                    <div class="grid grid-cols-3 gap-3">
                        <div onclick="setEnergy('gas')" id="btn-gas" class="option-card active text-center">
                            <i data-lucide="flame" class="mx-auto mb-1 text-orange-500"></i>
                            <span class="text-xs font-bold">天然气</span>
                        </div>
                        <div onclick="setEnergy('elec')" id="btn-elec" class="option-card text-center">
                            <i data-lucide="zap" class="mx-auto mb-1 text-yellow-500"></i>
                            <span class="text-xs font-bold">电加热</span>
                        </div>
                        <div onclick="setEnergy('coal')" id="btn-coal" class="option-card text-center">
                            <i data-lucide="layers" class="mx-auto mb-1 text-slate-600"></i>
                            <span class="text-xs font-bold">燃煤</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm space-y-4 border border-slate-100">
                    <div class="input-group">
                        <label>项目总投资 (万元)</label>
                        <input type="number" id="invest" value="100">
                    </div>
                    <div class="input-group" id="price-container">
                        <label id="price-label">天然气单价 (元/m³)</label>
                        <input type="number" id="unitPrice" value="3.5">
                    </div>
                    <hr>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>尾气风量 (Nm³/h)</label>
                            <input type="number" id="exFlow" value="25000">
                        </div>
                        <div class="input-group">
                            <label>排放温度 (℃)</label>
                            <input type="number" id="exTemp" value="150">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>年运行时间 (小时)</label>
                        <input type="number" id="hours" value="7000">
                    </div>
                    
                    <button onclick="calculate()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-blue-600 transition-all">
                        更新计算模型
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-blue-600 p-8 rounded-[2rem] text-white shadow-xl shadow-blue-100">
                        <p class="text-xs font-bold opacity-70 uppercase tracking-widest">预计回本周期</p>
                        <div class="text-5xl font-black mt-2"><span id="resPeriod">0</span> <small class="text-xl">年</small></div>
                        <p class="text-xs mt-4 bg-blue-500/50 inline-block px-3 py-1 rounded-full" id="resTypeTxt">基于天然气替代方案</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col justify-center">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">年度净收益预测</p>
                        <div class="text-4xl font-black text-slate-800 mt-2">¥ <span id="resMoney">0</span> <small class="text-lg">万</small></div>
                        <p class="text-xs text-emerald-500 font-bold mt-2 flex items-center gap-1">
                            <i data-lucide="arrow-up-right" size="14"></i> 较原始方案大幅降低成本
                        </p>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <i data-lucide="line-chart" class="text-blue-600"></i> 投资回收与现金流预测曲线
                    </h3>
                    <div class="h-[350px]">
                        <canvas id="roiChart"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentEnergy = 'gas';
        let roiChart = null;

        // 切换能源方式
        function setEnergy(type) {
            currentEnergy = type;
            // UI 反馈
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
            
            // 自动调整单价标签和默认值
            const label = document.getElementById('price-label');
            const input = document.getElementById('unitPrice');
            if(type === 'gas') { label.innerText = "天然气单价 (元/m³)"; input.value = 3.5; }
            if(type === 'elec') { label.innerText = "工业电费单价 (元/kWh)"; input.value = 0.85; }
            if(type === 'coal') { label.innerText = "标煤单价 (元/吨)"; input.value = 1100; }
            
            calculate();
        }

        function calculate() {
            const invest = parseFloat(document.getElementById('invest').value);
            const unitPrice = parseFloat(document.getElementById('unitPrice').value);
            const exFlow = parseFloat(document.getElementById('exFlow').value);
            const exTemp = parseFloat(document.getElementById('exTemp').value);
            const hours = parseFloat(document.getElementById('hours').value);

            // 热量计算 (显热)
            const rho = 1.2, cp = 1.005, eff = 0.7;
            const qKjH = exFlow * rho * cp * (exTemp - 60) * eff;
            const qGjH = qKjH / 1000000;

            // 收益计算
            let annualIncome = 0;
            if(currentEnergy === 'gas') {
                annualIncome = (qGjH / 0.035 * unitPrice * hours) / 10000;
                document.getElementById('resTypeTxt').innerText = "基于天然气替代方案";
            } else if(currentEnergy === 'elec') {
                annualIncome = (qKjH / 3600 * unitPrice * hours) / 10000;
                document.getElementById('resTypeTxt').innerText = "基于电加热替代方案";
            } else {
                annualIncome = (qGjH / 20 * unitPrice * hours) / 10000;
                document.getElementById('resTypeTxt').innerText = "基于燃煤替代方案";
            }

            // 更新文本
            document.getElementById('resMoney').innerText = annualIncome.toFixed(1);
            const period = invest / annualIncome;
            document.getElementById('resPeriod').innerText = period.toFixed(1);

            updateChart(invest, annualIncome);
        }

        function updateChart(invest, income) {
            const labels = Array.from({length: 11}, (_, i) => i + '年');
            const data = labels.map((_, i) => (income * i - invest).toFixed(2));

            if(roiChart) roiChart.destroy();
            const ctx = document.getElementById('roiChart').getContext('2d');
            
            roiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '累计净损益 (万元)',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                            gradient.addColorStop(0, 'rgba(255, 99, 132, 0.1)'); // 亏损区
                            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0)');
                            gradient.addColorStop(1, 'rgba(37, 99, 235, 0.2)');  // 盈利区
                            return gradient;
                        },
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 5,
                        pointBackgroundColor: '#2563eb'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: '#f1f5f9' },
                            ticks: { callback: v => v + '万' }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        window.onload = calculate;
    </script>
</body>
</html>
