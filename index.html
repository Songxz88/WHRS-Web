<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatMaster Pro | Xizhi Song 工业仿真系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', "PingFang SC", sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { @apply bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 transition-all; }
        .energy-opt { @apply cursor-pointer border-2 border-slate-100 p-3 rounded-2xl text-center transition-all hover:bg-slate-50 flex flex-col items-center gap-2; }
        .energy-opt.active { @apply border-blue-600 bg-blue-50 text-blue-600 font-bold shadow-md; }
        label { @apply block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider px-1; }
        input, select { @apply w-full bg-slate-50 border-none p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium transition-all; }
        .expert-panel { @apply bg-slate-50 p-5 rounded-2xl border-l-4 border-l-orange-400 mt-4 hidden animate-in fade-in slide-in-from-top-2; }
    </style>
</head>
<body class="pb-12">

    <div class="max-w-7xl mx-auto px-4 pt-8">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                    <i data-lucide="factory"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight">HeatMaster <span class="text-blue-600 italic">X</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Lead Designer: <span class="text-slate-900 font-black">Xizhi Song</span></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleExpert()" id="expertBtn" class="bg-white px-4 py-2 rounded-2xl border border-slate-100 text-[10px] font-bold text-slate-500 flex items-center gap-2 hover:bg-slate-50">
                    <i data-lucide="settings-2" size="14"></i> 工程模式
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="card border-blue-100 bg-blue-50/20">
                    <label class="text-blue-600">Step 0: 快速选择项目行业</label>
                    <select id="industrySelect" onchange="applyIndustryPreset()" class="mt-2 !bg-white border border-blue-100">
                        <option value="custom">-- 自定义工况 --</option>
                        <option value="printing">包装印刷 (凹印/复合)</option>
                        <option value="coating">涂装烤漆 (汽车/家具)</option>
                        <option value="food">食品烘干 (脱水蔬菜/宠物食品)</option>
                        <option value="textile">纺织印染 (定型机)</option>
                        <option value="chemical">精细化工 (反应釜尾气)</option>
                    </select>
                    <p class="text-[9px] text-blue-400 mt-2 italic">* 自动载入 Xizhi Song 行业标准经验值</p>
                </div>

                <div class="card">
                    <label>Step 1: 原加热能源</label>
                    <div class="grid grid-cols-3 gap-2 mt-3">
                        <div onclick="setEnergy('gas')" id="opt-gas" class="energy-opt active text-[10px]">天然气</div>
                        <div onclick="setEnergy('elec')" id="opt-elec" class="energy-opt text-[10px]">电加热</div>
                        <div onclick="setEnergy('coal')" id="opt-coal" class="energy-opt text-[10px]">导热油/煤</div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="font-bold text-sm mb-4 flex items-center gap-2"><i data-lucide="activity" size="16"></i> 实时运行工况</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>烟气入口温度 (℃)</label><input type="number" id="exTempIn" value="150"></div>
                            <div><label>新风入口温度 (℃)</label><input type="number" id="airTempIn" value="15"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>废气风量 (m³/h)</label><input type="number" id="exFlow" value="25000"></div>
                            <div><label>项目投资 (万)</label><input type="number" id="invest" value="100"></div>
                        </div>
                        <div><label id="priceLabel">单价</label><input type="number" id="unitPrice" value="3.5"></div>
                    </div>

                    <div id="expertSection" class="expert-panel">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>海拔 (m)</label><input type="number" id="altitude" value="0"></div>
                            <div><label>系统压降 (Pa)</label><input type="number" id="pDrop" value="350"></div>
                            <div class="col-span-2"><label>年开机时间 (h)</label><input type="number" id="hours" value="7000"></div>
                        </div>
                    </div>
                </div>

                <button onclick="calculate()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="zap" size="18"></i> 生成 Xizhi Song 诊断报告
                </button>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="card bg-slate-900 text-white relative overflow-hidden">
                    <div class="flex justify-between items-center mb-8 relative z-10">
                        <div>
                            <h3 class="font-bold">能量流动实时仿真</h3>
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Real-time Heat Exchange Simulation</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] bg-blue-600 px-2 py-1 rounded text-white font-bold">效能 72%</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 relative z-10">
                        <div class="space-y-2">
                            <div class="flex justify-between text-[10px] font-bold text-orange-400 uppercase"><span>烟气入口</span><span id="labelExIn">150℃</span></div>
                            <div class="h-2 bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-orange-500 w-full animate-pulse"></div></div>
                            <div class="flex justify-between text-[10px] font-bold text-blue-400 uppercase"><span>经回收后排放</span><span id="flowExOut">--℃</span></div>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-[10px] font-bold text-blue-400 uppercase"><span>新风入口</span><span id="labelAirIn">15℃</span></div>
                            <div class="h-2 bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-blue-500 w-1/4"></div></div>
                            <div class="flex justify-between text-[10px] font-bold text-red-500 uppercase"><span>预热送风温度</span><span id="flowAirOut">--℃</span></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="card"><p class="text-[10px] text-slate-400 font-bold uppercase">年净节省</p><div class="text-3xl font-black text-slate-900 mt-2">¥ <span id="resMoney">0</span> <small class="text-xs">万</small></div></div>
                    <div class="card border-blue-200"><p class="text-[10px] text-blue-600 font-bold uppercase">投资回收期</p><div class="text-3xl font-black text-blue-600 mt-2"><span id="resPeriod">0</span> <small class="text-xs">年</small></div></div>
                    <div class="card bg-emerald-500 text-white"><p class="text-[10px] opacity-80 font-bold uppercase">年度碳减排</p><div class="text-3xl font-black mt-2"><span id="resCo2">0</span> <small class="text-xs">t</small></div></div>
                </div>

                <div class="card h-[350px]">
                    <canvas id="roiChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentEnergy = 'gas', isExpert = false, roiChart = null;

        const presets = {
            printing: { exTemp: 80, exFlow: 35000, hours: 6500, invest: 120, pDrop: 350 },
            coating: { exTemp: 160, exFlow: 20000, hours: 4500, invest: 85, pDrop: 300 },
            food: { exTemp: 120, exFlow: 15000, hours: 7500, invest: 70, pDrop: 250 },
            textile: { exTemp: 180, exFlow: 45000, hours: 7200, invest: 210, pDrop: 450 },
            chemical: { exTemp: 220, exFlow: 10000, hours: 8000, invest: 95, pDrop: 400 }
        };

        function applyIndustryPreset() {
            const industry = document.getElementById('industrySelect').value;
            if(industry === 'custom') return;
            
            const data = presets[industry];
            document.getElementById('exTempIn').value = data.exTemp;
            document.getElementById('exFlow').value = data.exFlow;
            document.getElementById('hours').value = data.hours;
            document.getElementById('invest').value = data.invest;
            document.getElementById('pDrop').value = data.pDrop;
            
            calculate();
        }

        function toggleExpert() {
            isExpert = !isExpert;
            document.getElementById('expertSection').style.display = isExpert ? 'block' : 'none';
        }

        function setEnergy(type) {
            currentEnergy = type;
            document.querySelectorAll('.energy-opt').forEach(el => el.classList.remove('active'));
            document.getElementById('opt-' + type).classList.add('active');
            const label = document.getElementById('priceLabel');
            const input = document.getElementById('unitPrice');
            if(type === 'gas') { label.innerText = "气价 (元/m³)"; input.value = 3.6; }
            if(type === 'elec') { label.innerText = "电价 (元/kWh)"; input.value = 0.85; }
            if(type === 'coal') { label.innerText = "综合热价 (元/GJ)"; input.value = 95; }
            calculate();
        }

        function calculate() {
            const invest = parseFloat(document.getElementById('invest').value);
            const unitPrice = parseFloat(document.getElementById('unitPrice').value);
            const exFlow = parseFloat(document.getElementById('exFlow').value);
            const exTempIn = parseFloat(document.getElementById('exTempIn').value);
            const airTempIn = parseFloat(document.getElementById('airTempIn').value);
            const hours = parseFloat(document.getElementById('hours').value);
            const pDrop = isExpert ? parseFloat(document.getElementById('pDrop').value) : 300;

            const rho = 1.2, cp = 1.005, eff = 0.72;
            const qKjH = exFlow * rho * cp * (exTempIn - airTempIn) * eff;
            const qGjYear = (qKjH / 1000000) * hours;

            // 数值显示
            document.getElementById('labelExIn').innerText = exTempIn + "℃";
            document.getElementById('labelAirIn').innerText = airTempIn + "℃";
            const airRise = (qKjH / (exFlow * rho * cp));
            document.getElementById('flowAirOut').innerText = (airTempIn + airRise).toFixed(1) + "℃";
            document.getElementById('flowExOut').innerText = (exTempIn - airRise).toFixed(1) + "℃";

            // 收益
            let saving = 0;
            if(currentEnergy === 'gas') saving = (qGjYear / 0.0355 * unitPrice) / 10000;
            if(currentEnergy === 'elec') saving = (qKjH / 3600 * hours * unitPrice) / 10000;
            if(currentEnergy === 'coal') saving = (qGjYear * unitPrice) / 10000;

            const fanCost = (exFlow / 3600 * pDrop) / 650 * hours * 0.85 / 10000;
            const netIncome = saving - fanCost - (invest * 0.02);

            document.getElementById('resMoney').innerText = netIncome.toFixed(1);
            document.getElementById('resPeriod').innerText = (invest / netIncome).toFixed(1);
            document.getElementById('resCo2').innerText = Math.round(qGjYear * 0.078);

            updateChart(invest, netIncome);
        }

        function updateChart(invest, income) {
            const ctx = document.getElementById('roiChart').getContext('2d');
            const data = Array.from({length: 11}, (_, i) => (income * i - invest).toFixed(1));
            if(roiChart) roiChart.destroy();
            roiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 11}, (_, i) => i + '年'),
                    datasets: [{
                        label: '累计净收益 (万)',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        fill: true, tension: 0.4, borderWidth: 4, pointRadius: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        window.onload = calculate;
    </script>
</body>
</html>
