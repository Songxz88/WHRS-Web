<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatMaster Pro | Xizhi Song 能源仿真系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', "PingFang SC", sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { @apply bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 transition-all; }
        .energy-opt { @apply cursor-pointer border-2 border-slate-100 p-4 rounded-2xl text-center transition-all hover:bg-slate-50 flex flex-col items-center gap-2; }
        .energy-opt.active { @apply border-blue-600 bg-blue-50 text-blue-600 font-bold shadow-md; }
        label { @apply block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider px-1; }
        input { @apply w-full bg-slate-50 border-none p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium transition-all; }
        .expert-panel { @apply bg-slate-50 p-5 rounded-2xl border-l-4 border-l-orange-400 mt-4 hidden animate-in fade-in slide-in-from-top-2; }
        .spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-12">

    <div class="max-w-7xl mx-auto px-4 pt-8">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                    <i data-lucide="shield-check"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight italic">HeatMaster <span class="text-blue-600">X</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Lead Engineer: <span class="text-slate-900">Xizhi Song</span></p>
                </div>
            </div>
            <button onclick="toggleExpert()" id="expertBtn" class="bg-white px-4 py-2 rounded-2xl border border-slate-100 text-[10px] font-bold text-slate-500 flex items-center gap-2">
                <i data-lucide="settings-2" size="14"></i> 开启工程模式
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="card">
                    <label>Step 1: 原加热方式</label>
                    <div class="grid grid-cols-3 gap-2 mt-3">
                        <div onclick="setEnergy('gas')" id="opt-gas" class="energy-opt active text-[10px]">天然气</div>
                        <div onclick="setEnergy('elec')" id="opt-elec" class="energy-opt text-[10px]">电加热</div>
                        <div onclick="setEnergy('coal')" id="opt-coal" class="energy-opt text-[10px]">燃煤</div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="font-bold text-sm mb-4 flex items-center gap-2"><i data-lucide="thermometer" size="16"></i> 温差与风量参数</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>烟气温度 (℃)</label><input type="number" id="exTempIn" value="160"></div>
                            <div><label>进风温度 (℃)</label><input type="number" id="airTempIn" value="15"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>废气风量 (m³/h)</label><input type="number" id="exFlow" value="30000"></div>
                            <div><label>投资总额 (万)</label><input type="number" id="invest" value="120"></div>
                        </div>
                        <div><label id="priceLabel">气价 (元/m³)</label><input type="number" id="unitPrice" value="3.5"></div>
                    </div>

                    <div id="expertSection" class="expert-panel">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>海拔 (m)</label><input type="number" id="altitude" value="0"></div>
                            <div><label>压降 (Pa)</label><input type="number" id="pDrop" value="350"></div>
                            <div class="col-span-2"><label>年运行时间 (h)</label><input type="number" id="hours" value="7000"></div>
                        </div>
                    </div>
                </div>

                <button onclick="calculate()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-600 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="play" size="18"></i> 运行 Xizhi Song 仿真模型
                </button>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="card bg-slate-50 border-dashed border-2 text-center opacity-60">
                        <p class="text-[10px] font-bold mb-4 uppercase tracking-widest">原有工况</p>
                        <div class="flex justify-around items-center h-20">
                            <div class="text-[10px] font-bold text-orange-600">烟气 160℃<br>直接排放</div>
                            <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center"><i data-lucide="arrow-right"></i></div>
                            <div class="text-[10px] font-bold text-blue-600">新风 15℃<br>全额加热</div>
                        </div>
                    </div>
                    <div class="card border-blue-200 bg-blue-50/30 relative overflow-hidden">
                        <div class="absolute right-2 top-2"><i data-lucide="refresh-cw" class="text-blue-600/20 spin-slow" size="40"></i></div>
                        <p class="text-[10px] font-bold text-blue-600 mb-4 text-center uppercase tracking-widest">HeatMaster 优化流</p>
                        <div class="flex justify-around items-center h-20 relative z-10">
                            <div class="text-center"><span class="text-[10px] font-bold text-slate-400">烟气排放</span><br><span id="flowExOut" class="text-sm font-black text-blue-600">--℃</span></div>
                            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i data-lucide="zap"></i></div>
                            <div class="text-center"><span class="text-[10px] font-bold text-slate-400">预热送风</span><br><span id="flowAirOut" class="text-sm font-black text-red-600">--℃</span></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="card bg-slate-900 text-white"><p class="text-[10px] opacity-50 uppercase font-bold">年节省净额</p><div class="text-3xl font-black mt-2">¥ <span id="resMoney">0</span> <small class="text-sm font-normal uppercase">万/年</small></div></div>
                    <div class="card"><p class="text-[10px] text-slate-400 uppercase font-bold">静态回收期</p><div class="text-3xl font-black text-blue-600 mt-2"><span id="resPeriod">0</span> <small class="text-sm font-normal text-slate-400">年</small></div></div>
                    <div class="card bg-emerald-500 text-white"><p class="text-[10px] opacity-80 uppercase font-bold">碳减排贡献</p><div class="text-3xl font-black mt-2"><span id="resCo2">0</span> <small class="text-sm font-normal">t/CO2</small></div></div>
                </div>

                <div class="card h-[400px]">
                    <canvas id="roiChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentEnergy = 'gas', isExpert = false, roiChart = null;

        function toggleExpert() {
            isExpert = !isExpert;
            document.getElementById('expertSection').style.display = isExpert ? 'block' : 'none';
        }

        function setEnergy(type) {
            currentEnergy = type;
            document.querySelectorAll('.energy-opt').forEach(el => el.classList.remove('active'));
            document.getElementById('opt-' + type).classList.add('active');
            const label = document.getElementById('priceLabel');
            const input = document.getElementById('unitPrice');
            if(type === 'gas') { label.innerText = "气价(元/m³)"; input.value = 3.8; }
            if(type === 'elec') { label.innerText = "电价(元/kWh)"; input.value = 0.9; }
            if(type === 'coal') { label.innerText = "煤价(元/t)"; input.value = 1200; }
            calculate();
        }

        function calculate() {
            const invest = parseFloat(document.getElementById('invest').value);
            const unitPrice = parseFloat(document.getElementById('unitPrice').value);
            const exFlow = parseFloat(document.getElementById('exFlow').value);
            const exTempIn = parseFloat(document.getElementById('exTempIn').value);
            const airTempIn = parseFloat(document.getElementById('airTempIn').value);
            const alt = isExpert ? parseFloat(document.getElementById('altitude').value) : 0;
            const pDrop = isExpert ? parseFloat(document.getElementById('pDrop').value) : 300;
            const hours = isExpert ? parseFloat(document.getElementById('hours').value) : 7200;

            // Xizhi Song 物理模型逻辑
            const rho = 1.293 * Math.exp(-alt / 8000); 
            const cp = 1.005, eff = 0.7; // 效率
            
            // 1. 计算小时回收热量 (kW)
            const qKjH = exFlow * rho * cp * (exTempIn - airTempIn) * eff;
            const qGjYear = (qKjH / 1000000) * hours;

            // 2. 流程图数值联动
            const airRise = (qKjH / (exFlow * rho * cp));
            document.getElementById('flowAirOut').innerText = (airTempIn + airRise).toFixed(1) + "℃";
            document.getElementById('flowExOut').innerText = (exTempIn - airRise).toFixed(1) + "℃";

            // 3. 经济计算 (对冲额外风机能耗)
            let saving = 0;
            if(currentEnergy === 'gas') saving = (qGjYear / 0.0355 * unitPrice) / 10000;
            if(currentEnergy === 'elec') saving = (qKjH / 3600 * hours * unitPrice) / 10000;
            if(currentEnergy === 'coal') saving = (qGjYear / 20 * unitPrice) / 10000;

            const fanCost = (exFlow / 3600 * pDrop) / 600 * hours * 0.8 / 10000;
            const netIncome = saving - fanCost - (invest * 0.02); // 扣除维保

            document.getElementById('resMoney').innerText = netIncome.toFixed(1);
            document.getElementById('resPeriod').innerText = (invest / netIncome).toFixed(1);
            document.getElementById('resCo2').innerText = Math.round(qGjYear * 0.075);

            updateChart(invest, netIncome);
        }

        function updateChart(invest, income) {
            const ctx = document.getElementById('roiChart').getContext('2d');
            const data = Array.from({length: 11}, (_, i) => (income * i - invest).toFixed(1));
            if(roiChart) roiChart.destroy();
            roiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 11}, (_, i) => i + '年'),
                    datasets: [{
                        label: '累计损益(万)',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        fill: true, tension: 0.4, borderWidth: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        window.onload = calculate;
    </script>
</body>
</html>
