<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatMaster AI | 工业能效超算系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;500;900&display=swap');
        
        :root {
            --primary: #00f2ff;
            --accent: #7000ff;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            font-family: 'Noto Sans SC', sans-serif;
            color: #e1e1e1;
            overflow-x: hidden;
        }

        .tech-font { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .neo-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--primary);
            transition: all 0.3s;
        }

        .neo-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            outline: none;
        }

        .energy-btn {
            @apply cursor-pointer p-4 rounded-2xl border border-white/10 transition-all flex flex-col items-center gap-2;
            background: rgba(255,255,255,0.02);
        }

        .energy-btn.active {
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
        }

        /* 霓虹发光文字 */
        .neon-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5), 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div class="fixed inset-0 pointer-events-none opacity-20">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500 rounded-full filter blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600 rounded-full filter blur-[120px]"></div>
    </div>

    <div class="relative z-10 max-w-7xl mx-auto px-6 py-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-white/10 pb-8">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-black italic tracking-widest tech-font neon-text uppercase">
                    Heat<span class="text-white">Matrix</span> <span class="text-xs bg-cyan-500 text-black px-2 py-1 rounded not-italic tracking-normal align-middle">PRO 3.0</span>
                </h1>
                <p class="text-slate-400 text-xs font-bold mt-2 tracking-[0.3em] uppercase">工业余热回收数字化仿真座舱</p>
            </div>
            
            <div class="mt-6 md:mt-0 flex items-center gap-6 glass-panel px-6 py-3 rounded-full">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Expert Mode</span>
                    <span id="modeStatus" class="text-[10px] text-cyan-400 font-bold">STANDBY</span>
                </div>
                <button onclick="toggleExpert()" id="expertBtn" class="w-14 h-7 bg-slate-800 rounded-full relative border border-white/10">
                    <div id="toggleCircle" class="w-5 h-5 bg-cyan-400 rounded-full absolute left-1 top-1 transition-all shadow-[0_0_10px_#00f2ff]"></div>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-4 space-y-6">
                
                <div class="glass-panel p-6 rounded-[2.5rem]">
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-4 block">1. 初始动力源选择</label>
                    <div class="grid grid-cols-3 gap-3">
                        <div onclick="setEnergy('gas')" id="opt-gas" class="energy-btn active">
                            <i data-lucide="flame" class="text-orange-400"></i>
                            <span class="text-[10px] font-bold">天然气</span>
                        </div>
                        <div onclick="setEnergy('elec')" id="opt-elec" class="energy-btn">
                            <i data-lucide="zap" class="text-yellow-400"></i>
                            <span class="text-[10px] font-bold">电加热</span>
                        </div>
                        <div onclick="setEnergy('coal')" id="opt-coal" class="energy-btn">
                            <i data-lucide="box" class="text-slate-400"></i>
                            <span class="text-[10px] font-bold">燃煤方案</span>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-8 rounded-[2.5rem] space-y-5">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="col-span-2">
                            <label>项目投资总额 (万元)</label>
                            <input type="number" id="invest" value="150" class="neo-input mt-2">
                        </div>
                        <div class="col-span-2">
                            <label id="unitPriceLabel">能源单耗单价 (元)</label>
                            <input type="number" id="unitPrice" value="3.8" class="neo-input mt-2">
                        </div>
                        <div>
                            <label>尾气流量 (Nm³/h)</label>
                            <input type="number" id="exFlow" value="45000" class="neo-input mt-2 text-xs">
                        </div>
                        <div>
                            <label>废气温度 (℃)</label>
                            <input type="number" id="exTemp" value="180" class="neo-input mt-2 text-xs">
                        </div>
                    </div>

                    <div id="expertSection" class="hidden pt-4 border-t border-white/10 mt-4 space-y-4 animate-pulse">
                        <div class="flex items-center gap-2 text-cyan-400 font-bold text-[10px] mb-2 uppercase tracking-widest">
                            <i data-lucide="cpu" size="14"></i> 机载环境修正已就绪
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>系统阻力 (Pa)</label><input type="number" id="pDrop" value="450" class="neo-input"></div>
                            <div><label>地理海拔 (m)</label><input type="number" id="altitude" value="500" class="neo-input"></div>
                        </div>
                    </div>

                    <button onclick="calculate()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-700 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-cyan-900/20 hover:scale-[0.98] transition-all">
                        执行数字孪生仿真
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-panel p-8 rounded-[2.5rem] border-t-4 border-cyan-500 relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 opacity-5"><i data-lucide="banknote" size="80"></i></div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">年度净利</p>
                        <div class="text-4xl font-black tech-font neon-text mt-2">¥<span id="resMoney">0</span></div>
                        <p class="text-[10px] text-cyan-500 mt-2 font-bold tracking-widest">PROFIT / YEAR</p>
                    </div>
                    <div class="glass-panel p-8 rounded-[2.5rem] border-t-4 border-purple-500">
                        <p class="text-[10px] text-slate-500 font-bold uppercase">回本倒计时</p>
                        <div class="text-4xl font-black tech-font mt-2"><span id="resPeriod">0</span><small class="text-sm ml-2">YEARS</small></div>
                        <p class="text-[10px] text-purple-400 mt-2 font-bold tracking-widest">ROI DURATION</p>
                    </div>
                    <div class="glass-panel p-8 rounded-[2.5rem] border-t-4 border-emerald-500">
                        <p class="text-[10px] text-slate-500 font-bold uppercase">碳资产贡献</p>
                        <div class="text-4xl font-black tech-font text-emerald-400 mt-2"><span id="resCo2">0</span></div>
                        <p class="text-[10px] text-emerald-600 mt-2 font-bold tracking-widest">CO2 REDUCTION</p>
                    </div>
                </div>

                <div class="glass-panel p-8 rounded-[3rem] relative">
                    <div class="flex justify-between items-center mb-10">
                        <div>
                            <h3 class="text-xl font-black uppercase italic tracking-tighter">ROI Recovery Curve</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">投资回收与累积利润趋势仿真</p>
                        </div>
                        <div class="text-cyan-400 animate-pulse"><i data-lucide="activity"></i></div>
                    </div>
                    <div class="h-[400px]">
                        <canvas id="roiChart"></canvas>
                    </div>
                </div>

                <div class="bg-black/40 rounded-3xl p-6 font-mono text-[11px] text-cyan-500/80 border border-cyan-500/20">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-2 h-2 bg-red-500 rounded-full animate-ping"></div>
                        <span class="text-white font-bold uppercase tracking-widest">System Analysis Terminal</span>
                    </div>
                    <div id="terminal"> > 正在等待工况参数输入... </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentEnergy = 'gas';
        let isExpert = false;
        let roiChart = null;

        function toggleExpert() {
            isExpert = !isExpert;
            const section = document.getElementById('expertSection');
            const circle = document.getElementById('toggleCircle');
            const status = document.getElementById('modeStatus');
            
            if(isExpert) {
                section.classList.remove('hidden');
                circle.style.left = "32px";
                circle.classList.add('bg-cyan-400');
                status.innerText = "ACTIVE-AI";
                status.classList.replace('text-slate-500', 'text-cyan-400');
            } else {
                section.classList.add('hidden');
                circle.style.left = "4px";
                status.innerText = "STANDBY";
                status.classList.replace('text-cyan-400', 'text-slate-500');
            }
            calculate();
        }

        function setEnergy(type) {
            currentEnergy = type;
            document.querySelectorAll('.energy-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('opt-' + type).classList.add('active');
            const label = document.getElementById('unitPriceLabel');
            const input = document.getElementById('unitPrice');
            if(type === 'gas') { label.innerText = "天然气价格 (元/m³)"; input.value = 3.6; }
            if(type === 'elec') { label.innerText = "工业电价 (元/kWh)"; input.value = 0.85; }
            if(type === 'coal') { label.innerText = "标煤价格 (元/吨)"; input.value = 1200; }
            calculate();
        }

        function calculate() {
            const invest = parseFloat(document.getElementById('invest').value);
            const unitPrice = parseFloat(document.getElementById('unitPrice').value);
            const exFlow = parseFloat(document.getElementById('exFlow').value);
            const exTemp = parseFloat(document.getElementById('exTemp').value);
            const altitude = isExpert ? parseFloat(document.getElementById('altitude').value) : 0;
            const pDrop = isExpert ? parseFloat(document.getElementById('pDrop').value) : 300;

            const rho = 1.29 * Math.exp(-altitude / 8000); 
            const qKjH = exFlow * rho * 1.005 * (exTemp - 60) * 0.72;
            const qGjYear = (qKjH / 1000000) * 7000;

            let saving = 0;
            if(currentEnergy === 'gas') saving = (qGjYear / 0.035 * unitPrice) / 10000;
            if(currentEnergy === 'elec') saving = (qKjH / 3600 * 7000 * unitPrice) / 10000;
            if(currentEnergy === 'coal') saving = (qGjYear / 20 * unitPrice) / 10000;

            // 扣除维护与风机功耗
            const fanLoss = (exFlow / 3600 * pDrop) / 650 * 7000 * 0.8 / 10000; 
            const netSaving = saving - fanLoss - (invest * 0.02);

            document.getElementById('resMoney').innerText = Math.round(netSaving);
            document.getElementById('resPeriod').innerText = (invest / netSaving).toFixed(1);
            document.getElementById('resCo2').innerText = Math.round(qGjYear * 0.078);

            updateTerminal(exFlow, exTemp, altitude, netSaving);
            updateChart(invest, netSaving);
        }

        function updateTerminal(flow, temp, alt, profit) {
            const t = document.getElementById('terminal');
            t.innerHTML = `> 初始化流体动力学仿真... OK<br>` +
                        `> 环境修正：海拔 ${alt}m | 密度修正系数：${(Math.exp(-alt/8000)).toFixed(2)}<br>` +
                        `> 核心热量交换：${(flow*1.2).toFixed(0)} kg/h 质量流量<br>` +
                        `> 模拟完成：预计年度能源替代净收益为 ¥${(profit*10000).toLocaleString()}。`;
        }

        function updateChart(invest, income) {
            const ctx = document.getElementById('roiChart').getContext('2d');
            const years = Array.from({length: 11}, (_, i) => i + 'Y');
            const data = years.map((_, i) => (income * i - invest).toFixed(1));

            if(roiChart) roiChart.destroy();
            roiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [{
                        label: 'Cumulative Net Cash Flow',
                        data: data,
                        borderColor: '#00f2ff',
                        borderWidth: 5,
                        pointBackgroundColor: '#00f2ff',
                        pointHoverRadius: 8,
                        fill: true,
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return;
                            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            gradient.addColorStop(0, 'rgba(0, 242, 255, 0.2)');
                            gradient.addColorStop(1, 'rgba(112, 0, 255, 0)');
                            return gradient;
                        },
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#64748b', font: { family: 'Orbitron' } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#64748b', font: { family: 'Orbitron' } }
                        }
                    }
                }
            });
        }

        window.onload = calculate;
    </script>
</body>
</html>
