<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatRecover AI | 工业余热精细化测算系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7fa; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .input-card { @apply bg-white p-6 rounded-2xl shadow-sm border border-slate-100 transition-all duration-300; }
        .input-card:hover { @apply shadow-md border-blue-200; }
        input[type="number"] { @apply w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none; }
        label { @apply block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider; }
        .tab-btn.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
    </style>
</head>
<body class="text-slate-800">

    <div class="flex min-h-screen">
        <aside class="w-20 lg:w-64 bg-slate-900 text-white flex flex-col items-center py-8 px-4 gap-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="p-2 bg-blue-600 rounded-lg"><i data-lucide="flame" size="24"></i></div>
                <span class="hidden lg:block font-extrabold text-xl tracking-tighter">HeatMaster</span>
            </div>
            <nav class="flex flex-col gap-4 w-full">
                <button onclick="switchTab('energy')" class="tab-btn active flex items-center gap-3 p-4 rounded-xl transition w-full">
                    <i data-lucide="zap"></i> <span class="hidden lg:block">能源基准</span>
                </button>
                <button onclick="switchTab('exhaust')" class="tab-btn flex items-center gap-3 p-4 rounded-xl transition w-full">
                    <i data-lucide="wind"></i> <span class="hidden lg:block">尾气参数</span>
                </button>
                <button onclick="switchTab('freshair')" class="tab-btn flex items-center gap-3 p-4 rounded-xl transition w-full">
                    <i data-lucide="cloud-rain"></i> <span class="hidden lg:block">新风系统</span>
                </button>
                <button onclick="switchTab('space')" class="tab-btn flex items-center gap-3 p-4 rounded-xl transition w-full">
                    <i data-lucide="maximize"></i> <span class="hidden lg:block">空间布局</span>
                </button>
            </nav>
            <div class="mt-auto opacity-40 text-[10px] hidden lg:block text-center italic">Professional Engineering Tools v3.0</div>
        </aside>

        <main class="flex-1 p-6 lg:p-10 overflow-y-auto">
            <header class="flex justify-between items-end mb-10">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900">项目效益实时分析</h1>
                    <p class="text-slate-500 mt-1">基于实时工况的能量平衡与ROI模拟</p>
                </div>
                <button onclick="calculateAll()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-600 transition-all flex items-center gap-2">
                    <i data-lucide="play" size="18"></i> 运行全量计算
                </button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 space-y-6">
                    <div id="panel-energy" class="tab-panel input-card">
                        <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="coins" class="text-yellow-500"></i> 能源成本单价</h3>
                        <div class="space-y-4">
                            <div><label>天然气价格 (元/m³)</label><input type="number" id="pGas" value="3.8"></div>
                            <div><label>蒸汽价格 (元/吨)</label><input type="number" id="pSteam" value="260"></div>
                            <div><label>工业电价 (元/kWh)</label><input type="number" id="pElec" value="0.9"></div>
                        </div>
                    </div>

                    <div id="panel-exhaust" class="tab-panel hidden input-card">
                        <h3 class="font-bold mb-4 flex items-center gap-2 text-orange-600"><i data-lucide="thermometer-sun"></i> 尾气端数据</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="col-span-2"><label>尾气总量 (Nm³/h)</label><input type="number" id="exFlow" value="25000"></div>
                            <div><label>排放温度 (℃)</label><input type="number" id="exTemp" value="145"></div>
                            <div><label>含湿量 (g/kg)</label><input type="number" id="exHum" value="35"></div>
                            <div class="col-span-2"><label>溶剂浓度 (mg/m³)</label><input type="number" id="exVoc" value="200"></div>
                        </div>
                    </div>

                    <div id="panel-freshair" class="tab-panel hidden input-card">
                        <h3 class="font-bold mb-4 flex items-center gap-2 text-blue-600"><i data-lucide="fan"></i> 新风与风机参数</h3>
                        <div class="space-y-4">
                            <div><label>新风处理量 (Nm³/h)</label><input type="number" id="airFlow" value="22000"></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label>进风温度 (℃)</label><input type="number" id="airTempIn" value="15"></div>
                                <div><label>风机频率 (Hz)</label><input type="number" id="fanFreq" value="42"></div>
                            </div>
                        </div>
                    </div>

                    <div id="panel-space" class="tab-panel hidden input-card">
                        <h3 class="font-bold mb-4 flex items-center gap-2 text-purple-600"><i data-lucide="ruler"></i> 改造空间约束 (m)</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <div><label>长</label><input type="number" id="sL" value="5.5"></div>
                            <div><label>宽</label><input type="number" id="sW" value="2.2"></div>
                            <div><label>高</label><input type="number" id="sH" value="3.5"></div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-white">
                        <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl shadow-xl shadow-blue-100">
                            <p class="text-xs opacity-70 uppercase font-bold tracking-widest mb-1">年节省费用</p>
                            <div class="text-3xl font-black">¥ <span id="resMoney">0</span> <small class="text-sm font-normal">万</small></div>
                        </div>
                        <div class="bg-slate-800 p-6 rounded-3xl">
                            <p class="text-xs opacity-50 uppercase font-bold tracking-widest mb-1">回收期 (ROI)</p>
                            <div class="text-3xl font-black text-blue-400"><span id="resPeriod">0</span> <small class="text-sm font-normal text-white">年</small></div>
                        </div>
                        <div class="bg-emerald-600 p-6 rounded-3xl">
                            <p class="text-xs opacity-70 uppercase font-bold tracking-widest mb-1">碳减排贡献</p>
                            <div class="text-3xl font-black"><span id="resCo2">0</span> <small class="text-sm font-normal uppercase">t/y</small></div>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-3xl border border-slate-100">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold">能源替代效益对比 (等效价值)</h3>
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold rounded-full">LIVE PREVIEW</span>
                        </div>
                        <div class="h-[300px]">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                    
                    <div id="adviceBox" class="bg-blue-50 border border-blue-100 p-5 rounded-2xl flex gap-4 items-start">
                        <i data-lucide="info" class="text-blue-600 mt-1"></i>
                        <div class="text-sm text-blue-900 leading-relaxed" id="resAdvice">
                            正在分析工况数据...
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let chart = null;

        function switchTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + id).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function calculateAll() {
            // 获取各参数
            const exFlow = parseFloat(document.getElementById('exFlow').value);
            const exTemp = parseFloat(document.getElementById('exTemp').value);
            const airFlow = parseFloat(document.getElementById('airFlow').value);
            const airInT = parseFloat(document.getElementById('airTempIn').value);
            const pGas = parseFloat(document.getElementById('pGas').value);
            const pElec = parseFloat(document.getElementById('pElec').value);
            const pSteam = parseFloat(document.getElementById('pSteam').value);
            
            // 物理常量与计算逻辑
            const rho = 1.29; // 空气密度
            const cp = 1.005; // 空气比热
            const eff = 0.68; // 工业换热器综合效率
            
            // 1. 回收功率计算 (kW)
            const deltaT = exTemp - 55; // 假设排气降至55℃
            const powerKW = (exFlow * rho * cp * deltaT * eff) / 3600;
            const energyGJ_H = powerKW * 3600 / 1000000;
            
            // 2. 能源替代量 (每小时)
            const savedGasH = energyGJ_H / 0.035; // 1m³天然气约为0.035GJ
            const savedSteamH = energyGJ_H / 2.7; // 1吨低压蒸汽约为2.7GJ
            const savedElecH = powerKW;

            // 3. 经济计算 (年运行7000h)
            const hours = 7000;
            const yearlyMoney = (savedGasH * pGas * hours) / 10000;
            const investment = 65; // 假设默认投资
            const co2 = energyGJ_H * hours * 0.075;

            // 4. 界面更新
            document.getElementById('resMoney').innerText = yearlyMoney.toFixed(1);
            document.getElementById('resPeriod').innerText = (investment / yearlyMoney).toFixed(2);
            document.getElementById('resCo2').innerText = Math.round(co2);

            // 5. 动态建议逻辑
            let advice = `根据当前测算，新风温度可从 ${airInT}℃ 提升至约 ${Math.round(airInT + (energyGJ_H*1000000/(airFlow*rho*cp)))}℃。`;
            if(parseFloat(document.getElementById('fanFreq').value) > 45) {
                advice += " <br><b>注意：</b>当前风机频率较高，增加换热器压降可能导致风量不足，建议核算风机余压。";
            }
            document.getElementById('resAdvice').innerHTML = advice;

            updateChart(savedGasH * pGas, (powerKW * pElec), (savedSteamH * pSteam));
        }

        function updateChart(gas, elec, steam) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['天然气方案', '纯电补偿方案', '蒸汽补偿方案'],
                    datasets: [{
                        label: '小时节省费用 (元)',
                        data: [gas.toFixed(1), elec.toFixed(1), steam.toFixed(1)],
                        backgroundColor: ['#2563eb', '#1e293b', '#10b981'],
                        borderRadius: 12,
                        barThickness: 40
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { drawBorder: false, color: '#f1f5f9' } }, x: { grid: { display: false } } }
                }
            });
        }

        window.onload = () => {
            calculateAll();
        };
    </script>
</body>
</html>
